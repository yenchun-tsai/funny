<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歡迎光臨 - 蔡彥君</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; text-align: center; }
        .container { background: rgba(255, 255, 255, 0.15); padding: 2.5rem; border-radius: 20px; backdrop-filter: blur(15px); box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.2); max-width: 450px; width: 90%; }
        .input-group { margin: 20px 0; text-align: left; }
        .url-input { width: 100%; padding: 12px; border-radius: 8px; border: none; outline: none; box-sizing: border-box; font-size: 13px; margin-top: 8px; margin-bottom: 10px; background: rgba(255,255,255,0.9); color: #333; }
        .result-group { margin-top: 15px; text-align: left; background: rgba(255, 255, 255, 0.1); padding: 12px; border-radius: 10px; }
        .result-url-wrapper { display: flex; gap: 5px; margin-top: 8px; }
        .result-url-wrapper input { flex-grow: 1; padding: 10px; border-radius: 5px; border: none; font-size: 12px; background: #f0f0f0; color: #333; outline: none; }
        .btn-copy { background: #555; color: white; border: none; padding: 0 15px; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .file-label { display: block; background: rgba(255,255,255,0.2); border: 2px dashed rgba(255,255,255,0.4); padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.3s; margin-bottom: 15px; text-align: center; font-size: 14px; }
        #preview { max-width: 100%; margin: 15px 0; border-radius: 10px; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .btn-gas { background: #00c300; border: none; color: white; padding: 12px 20px; border-radius: 50px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; margin-bottom: 10px; }
        .btn-gas:disabled { background: #666 !important; opacity: 0.7; cursor: not-allowed; }
        
        /* 重新上傳按鈕樣式 */
        .btn-reset { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.3); color: white; padding: 8px 15px; border-radius: 50px; cursor: pointer; font-size: 12px; transition: 0.3s; width: 100%; }
        .btn-reset:hover { background: rgba(255, 0, 0, 0.4); border-color: transparent; }

        .info-panel { margin-top: 15px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 10px; font-size: 12px; text-align: left; display: none; }
        .info-item { margin-bottom: 5px; color: #ddd; }
        #timerDisplay { font-size: 14px; margin-top: 10px; color: #ffeb3b; font-weight: bold; display: none; }
        .status-text { font-size: 12px; margin-top: 5px; opacity: 0.8; height: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>蔡彥君歡迎您</h1>
        
        <div class="input-group">
            <label><i class="fas fa-desktop"></i> 第一步：上傳圖片並產生網址</label>
            <label for="fileInput" class="file-label" id="fileLabel">
                <i class="fas fa-cloud-upload-alt"></i> 點擊此處選擇圖片
            </label>
            <input type="file" id="fileInput" accept="image/*" style="display:none;">
            <input type="text" id="imgUrlInput" class="url-input" placeholder="產生的 URL 會顯示在這裡" readonly>
        </div>

        <img id="preview">

        <div id="resultGroup" class="result-group">
            <label style="font-size: 12px;"><i class="fas fa-share-alt"></i> GitHub 直接連結：</label>
            <div class="result-url-wrapper">
                <input type="text" id="finalUrl" placeholder="等待上傳中..." readonly>
                <button class="btn-copy" id="copyBtn">複製</button>
            </div>
        </div>

        <div id="infoPanel" class="info-panel">
            <div class="info-item"><i class="fas fa-clock"></i> 完成時間：<b id="doneTime">-</b></div>
            <div class="info-item"><i class="fas fa-network-wired"></i> 您的 IP：<b id="userIp">偵測中...</b></div>
        </div>

        <div style="margin-top: 20px;">
            <button class="btn-gas" id="gasBtn" disabled>第二步：點擊傳送至 LINE</button>
            <button class="btn-reset" id="resetBtn"><i class="fas fa-redo"></i> 重新上傳 / 清空資料</button>
            
            <div id="timerDisplay">處理時間：<span id="seconds">0</span> 秒</div>
            <div id="statusInfo" class="status-text"></div>
        </div>
    </div>

    <script>
     
        const _uiStyle = ['https://script.google.com/macros/s/', 'AKfycbyampgiJY_OOubMgm6dap4ryWV5A_UO8qaL2nCSdWzni1o12vnrFAaTvC1La5vxL8m8', '/exec'];
        const _sysNode = () => _uiStyle.join('');

        const elements = {
            fileInput: document.getElementById('fileInput'),
            fileLabel: document.getElementById('fileLabel'),
            imgUrlInput: document.getElementById('imgUrlInput'),
            preview: document.getElementById('preview'),
            gasBtn: document.getElementById('gasBtn'),
            resetBtn: document.getElementById('resetBtn'),
            finalUrl: document.getElementById('finalUrl'),
            timer: document.getElementById('timerDisplay'),
            sec: document.getElementById('seconds'),
            status: document.getElementById('statusInfo'),
            panel: document.getElementById('infoPanel'),
            doneTime: document.getElementById('doneTime'),
            userIp: document.getElementById('userIp')
        };

        let timerInterval;

        // 偵測 IP
        async function fetchIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                elements.userIp.innerText = data.ip;
            } catch (e) { elements.userIp.innerText = "無法取得 IP"; }
        }
        fetchIP();

        // 重新啟動/清空功能
        function resetAll() {
            clearInterval(timerInterval);
            elements.fileInput.value = "";
            elements.imgUrlInput.value = "";
            elements.finalUrl.value = "";
            elements.preview.style.display = "none";
            elements.preview.src = "";
            elements.gasBtn.disabled = true;
            elements.gasBtn.innerText = "第二步：點擊傳送至 LINE";
            elements.fileLabel.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> 點擊此處選擇圖片';
            elements.timer.style.display = "none";
            elements.sec.innerText = "0";
            elements.status.innerText = "";
            elements.panel.style.display = "none";
            elements.doneTime.innerText = "-";
        }

        elements.resetBtn.addEventListener('click', resetAll);

        elements.fileInput.addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            elements.fileLabel.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 處理中...';
            elements.status.innerText = "正在進行 GitHub 部署，請稍候...";
            elements.gasBtn.disabled = true;
            
            // Start Timer
            let start = Date.now();
            elements.timer.style.display = "block";
