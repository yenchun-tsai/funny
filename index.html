<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歡迎光臨</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #74abe2, #5563b1);
            color: white;
            text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }
        p {
            font-size: 1.2rem;
            opacity: 0.9;
        }
        .counter-box {
            margin-top: 2rem;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            display: inline-block;
        }
        #count {
            font-size: 2rem;
            font-weight: bold;
            color: #ffd700;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>歡迎光臨！</h1>
        <p>很高興見到你，祝你有美好的一天。</p>
        
        <div class="counter-box">
            這是您第 <span id="count">0</span> 次造訪此頁面
        </div>
    </div>

    <script>
        // 訪客計數邏輯
        function updateCounter() {
            // 從 localStorage 讀取次數，如果沒有則設為 0
            let visits = localStorage.getItem('visit_count');
            
            if (visits === null) {
                visits = 1;
            } else {
                visits = parseInt(visits) + 1;
            }
            
            // 存回 localStorage
            localStorage.setItem('visit_count', visits);
            
            // 顯示在網頁上
            document.getElementById('count').innerText = visits;
        }

        // 執行函式
        updateCounter();
    </script>
</body>
</html>
