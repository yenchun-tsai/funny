<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歡迎光臨 - 蔡彥君</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; text-align: center; }
        .container { background: rgba(255, 255, 255, 0.15); padding: 2.5rem; border-radius: 20px; backdrop-filter: blur(15px); box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.2); max-width: 450px; width: 90%; }
        h1 { margin-bottom: 5px; }
        
        .counter-box { margin: 15px 0; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-reset { background: none; border: none; color: rgba(255,255,255,0.6); cursor: pointer; font-size: 14px; transition: 0.3s; }
        .btn-reset:hover { color: #ff4d4d; transform: rotate(90deg); }

        .input-group { margin: 20px 0; text-align: left; }
        .url-input { width: 100%; padding: 12px; border-radius: 8px; border: none; outline: none; box-sizing: border-box; font-size: 14px; margin-top: 8px; margin-bottom: 10px; }
        
        /* PC 上傳按鈕樣式 */
        .file-label { display: block; background: rgba(255,255,255,0.2); border: 2px dashed rgba(255,255,255,0.4); padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.3s; margin-bottom: 15px; text-align: center; font-size: 14px; }
        .file-label:hover { background: rgba(255,255,255,0.3); }
        #fileInput { display: none; }

        #preview { max-width: 100%; margin: 15px 0; border-radius: 10px; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        
        .debug-panel { margin-top: 10px; padding: 10px; background: rgba(0,0,0,0.4); border-radius: 8px; font-size: 11px; text-align: left; word-break: break-all; }
        .debug-title { color: #00c300; font-weight: bold; margin-bottom: 5px; display: block; border-bottom: 1px solid rgba(0,195,0,0.3); padding-bottom: 2px; }
        .info-label { color: #aaa; margin-right: 5px; }

        .action-row { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .btn-group { display: flex; gap: 10px; width: 100%; }
        
        .btn-gas, .btn-personal { border: none; color: white; padding: 12px 20px; border-radius: 50px; cursor: pointer; font-weight: bold; flex-grow: 1; transition: 0.3s; font-size: 14px; }
        .btn-gas { background: #00c300; }
        .btn-gas:hover { background: #00a300; transform: translateY(-2px); }
        .btn-personal { background: #007bff; }
        .btn-personal:hover { background: #0056b3; transform: translateY(-2px); }
        .btn-gas:disabled, .btn-personal:disabled { background: #666; cursor: wait; }

        .share-circle { width: 48px; height: 48px; border-radius: 50%; background: white; color: #00c300; display: flex; justify-content: center; align-items: center; text-decoration: none; font-size: 24px; transition: 0.3s; border: 1px solid #ddd; margin: 0 auto; }
    </style>
</head>
<body>

    <div class="container">
        <h1>蔡彥君歡迎您</h1>
        
        <div class="counter-box">
            <span>您是第 <span id="count">0</span> 位訪客</span>
            <button class="btn-reset" id="resetBtn" title="重置計數器">
                <i class="fas fa-undo-alt"></i>
            </button>
        </div>

        <div class="input-group">
            <label><i class="fas fa-desktop"></i> 從電腦上傳圖片：</label>
            <label for="fileInput" class="file-label" id="fileLabel">
                <i class="fas fa-cloud-upload-alt"></i> 點擊選擇電腦中的圖片
            </label>
            <input type="file" id="fileInput" accept="image/*">

            <label><i class="fas fa-link"></i> 或直接輸入網址：</label>
            <input type="text" id="imgUrlInput" class="url-input" placeholder="https://example.com/image.jpg">
        </div>

        <img id="preview">
        
        <div id="debugPanel" class="debug-panel" style="display:none;">
            <span class="debug-title"><i class="fas fa-code"></i> 傳送資訊明細</span>
            <div><span class="info-label">目標 ID:</span> <span id="targetId">Ud80b...7a5c</span></div>
            <div><span class="info-label">圖片網址:</span> <span id="paramValue"></span></div>
        </div>

        <div class="action-row">
            <div class="btn-group">
                <button class="btn-gas" id="gasBtn">機器人傳送</button>
                <button class="btn-personal" id="personalBtn">傳送到個人視窗</button>
            </div>
            
            <a class="share-circle" id="lineShare" target="_blank" title="分享給好友">
                <i class="fab fa-line"></i>
            </a>
        </div>
    </div>

    <script>
        const LINE_USER_ID = "Ud80b2b85f7f616d04fda94f3b4b77a5c";
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbyampgiJY_OOubMgm6dap4ryWV5A_UO8qaL2nCSdWzni1o12vnrFAaTvC1La5vxL8m8/exec';

        // 1. 計數器邏輯
        function updateCountDisplay() {
            let visits = localStorage.getItem('v_count') || 0;
            document.getElementById('count').innerText = visits;
        }

        let visits = localStorage.getItem('v_count') || 0;
        visits++;
        localStorage.setItem('v_count', visits);
        updateCountDisplay();

        document.getElementById('resetBtn').addEventListener('click', function() {
            if (confirm("確定要重置訪客計數器嗎？")) {
                localStorage.setItem('v_count', 0);
                updateCountDisplay();
            }
        });

        const imgUrlInput = document.getElementById('imgUrlInput');
        const fileInput = document.getElementById('fileInput');
        const fileLabel = document.getElementById('fileLabel');
        const preview = document.getElementById('preview');
        const debugPanel = document.getElementById('debugPanel');
        const paramValue = document.getElementById('paramValue');
        const gasBtn = document.getElementById('gasBtn');
        const personalBtn = document.getElementById('personalBtn');
        const targetIdSpan = document.getElementById('targetId');

        // 更新預覽畫面
        function updatePreview(url) {
            if (url) {
                preview.src = url;
                preview.style.display = 'block';
                debugPanel.style.display = 'block';
                paramValue.innerText = url;
                targetIdSpan.innerText = LINE_USER_ID;
                preview.onerror = function() {
                    this.style.display = 'none';
                    paramValue.innerText = "⚠️ 網址無效";
                };
            } else {
                preview.style.display = 'none';
                debugPanel.style.display = 'none';
            }
        }

        // 2. 處理 PC 端檔案上傳 (Imgur 匿名 API)
        fileInput.addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // 顯示上傳狀態
            gasBtn.disabled = true;
            personalBtn.disabled = true;
            fileLabel.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 圖片上傳中...';

            const formData = new FormData();
            formData.append('image', file);

            try {
                const response = await fetch('https://api.imgur.com/3/image', {
                    method: 'POST',
                    headers: { Authorization: 'Client-ID 544bb4c000787e9' },
                    body: formData
                });
                const data = await response.json();
                if (data.success) {
                    const uploadedUrl = data.data.link;
                    imgUrlInput.value = uploadedUrl;
                    updatePreview(uploadedUrl);
                    fileLabel.innerHTML = '<i class="fas fa-check-circle"></i> 上傳完成！';
                } else {
                    alert("上傳失敗，請換一張圖試試");
                }
            } catch (err) {
                alert("Imgur API 連線錯誤");
            } finally {
                gasBtn.disabled = false;
                personalBtn.disabled = false;
                setTimeout(() => { fileLabel.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> 點擊選擇電腦中的圖片'; }, 3000);
            }
        });

        // 當輸入框手動改變時
        imgUrlInput.addEventListener('input', function() {
            updatePreview(this.value.trim());
        });

        // 3. GAS 傳送 (機器人視窗)
        gasBtn.addEventListener('click', async function() {
            const urlToSend = imgUrlInput.value.trim();
            if (!urlToSend) { alert("請先上傳圖片或輸入網址！"); return; }
            this.disabled = true;
            this.innerText = '傳送中...';
            try {
                await fetch(`${GAS_URL}?imgUrl=${encodeURIComponent(urlToSend)}`, { method: 'GET', mode: 'no-cors' });
                alert('已發送至機器人視窗！');
            } catch (e) { alert('傳送失敗'); }
            finally { this.disabled = false; this.innerText = '機器人傳送'; }
        });

        // 4. LINE Social Plugin 傳送 (個人視窗)
        personalBtn.addEventListener('click', function() {
            const urlToSend = imgUrlInput.value.trim();
            if (!urlToSend) { alert("請先上傳圖片或輸入網址！"); return; }
            const lineShareUrl = `https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(urlToSend)}`;
            window.open(lineShareUrl, '_blank', 'width=500,height=500');
        });

        const shareText = encodeURIComponent(`我是蔡彥君網頁的訪客！`);
        document.getElementById('lineShare').href = `https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(window.location.href)}&text=${shareText}`;
    </script>
</body>
</html>
