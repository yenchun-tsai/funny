<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歡迎光臨 - 蔡彥君</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; text-align: center; }
        .container { background: rgba(255, 255, 255, 0.15); padding: 2.5rem; border-radius: 20px; backdrop-filter: blur(15px); box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.2); max-width: 450px; width: 90%; }
        .input-group { margin: 20px 0; text-align: left; }
        .url-input { width: 100%; padding: 12px; border-radius: 8px; border: none; outline: none; box-sizing: border-box; font-size: 13px; margin-top: 8px; margin-bottom: 10px; background: rgba(255,255,255,0.9); color: #333; }
        .result-group { margin-top: 15px; text-align: left; background: rgba(255, 255, 255, 0.1); padding: 12px; border-radius: 10px; }
        .result-url-wrapper { display: flex; gap: 5px; margin-top: 8px; }
        .result-url-wrapper input { flex-grow: 1; padding: 10px; border-radius: 5px; border: none; font-size: 12px; background: #f0f0f0; color: #333; outline: none; }
        .btn-copy { background: #555; color: white; border: none; padding: 0 15px; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .file-label { display: block; background: rgba(255,255,255,0.2); border: 2px dashed rgba(255,255,255,0.4); padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.3s; margin-bottom: 15px; text-align: center; font-size: 14px; }
        #preview { max-width: 100%; margin: 15px 0; border-radius: 10px; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .btn-gas { background: #00c300; border: none; color: white; padding: 12px 20px; border-radius: 50px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn-gas:disabled { background: #666 !important; opacity: 0.7; cursor: not-allowed; }
        
        /* 資訊顯示區樣式 */
        .info-panel { margin-top: 15px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 10px; font-size: 12px; text-align: left; display: none; }
        .info-item { margin-bottom: 5px; color: #ddd; }
        .info-item b { color: #fff; }
        #timerDisplay { font-size: 14px; margin-top: 10px; color: #ffeb3b; font-weight: bold; display: none; }
        .status-text { font-size: 12px; margin-top: 5px; opacity: 0.8; height: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>蔡彥君歡迎您</h1>
        
        <div class="input-group">
            <label><i class="fas fa-desktop"></i> 第一步：上傳圖片並產生網址</label>
            <label for="fileInput" class="file-label" id="fileLabel">
                <i class="fas fa-cloud-upload-alt"></i> 點擊此處選擇圖片
            </label>
            <input type="file" id="fileInput" accept="image/*" style="display:none;">
            <input type="text" id="imgUrlInput" class="url-input" placeholder="產生的 URL 會顯示在這裡" readonly>
        </div>

        <img id="preview">

        <div id="resultGroup" class="result-group">
            <label style="font-size: 12px;"><i class="fas fa-share-alt"></i> GitHub 直接連結：</label>
            <div class="result-url-wrapper">
                <input type="text" id="finalUrl" placeholder="等待上傳中..." readonly>
                <button class="btn-copy" id="copyBtn">複製</button>
            </div>
        </div>

        <div id="infoPanel" class="info-panel">
            <div class="info-item"><i class="fas fa-clock"></i> 完成時間：<b id="doneTime">-</b></div>
            <div class="info-item"><i class="fas fa-network-wired"></i> 您的 IP：<b id="userIp">正在偵測...</b></div>
        </div>

        <div style="margin-top: 20px;">
            <button class="btn-gas" id="gasBtn" disabled>第二步：點擊傳送至 LINE</button>
            <div id="timerDisplay">處理時間：<span id="seconds">0</span> 秒</div>
            <div id="statusInfo" class="status-text"></div>
        </div>
    </div>

    <script>
     
        const _uiStyle = [
            'https://script.google.com/macros/s/',
            'AKfycbyampgiJY_OOubMgm6dap4ryWV5A_UO8qaL2nCSdWzni1o12vnrFAaTvC1La5vxL8m8',
            '/exec'
        ];
        const _sysNode = () => _uiStyle.join('');

        const fileInput = document.getElementById('fileInput');
        const fileLabel = document.getElementById('fileLabel');
        const preview = document.getElementById('preview');
        const gasBtn = document.getElementById('gasBtn');
        const finalUrlInput = document.getElementById('finalUrl');
        const timerDisplay = document.getElementById('timerDisplay');
        const secondsSpan = document.getElementById('seconds');
        const statusInfo = document.getElementById('statusInfo');
        const infoPanel = document.getElementById('infoPanel');
        const doneTime = document.getElementById('doneTime');
        const userIp = document.getElementById('userIp');

        let timerInterval;
        let startTime;

        // 偵測 IP
        async function fetchIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                userIp.innerText = data.ip;
            } catch (e) {
                userIp.innerText = "無法取得 IP";
            }
        }
        fetchIP(); // 頁面載入即偵測

        function startTimer() {
            clearInterval(timerInterval);
            startTime = Date.now();
            timerDisplay.style.display = 'block';
            infoPanel.style.display = 'none'; // 重新開始時隱藏舊資訊
            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                secondsSpan.innerText = elapsed;
                if (elapsed > 40) statusInfo.innerText = "GitHub 正在編譯，請稍候...";
            }, 1000);
        }

        fileInput.addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            fileLabel.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 處理中...';
            statusInfo.innerText = "正在上傳並觸發 GitHub 部署...";
            gasBtn.disabled = true;
            startTimer();

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const base64Content = reader.result.split(',')[1];
                const formData = new URLSearchParams();
                formData.append('name', file.name);
                formData.append('content', base64Content);

                try {
                    const response = await fetch(_sysNode(), {
                        method: 'POST',
                        body: formData.toString(),
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
                    });
                    
                    const result = await response.json();
                    
                    if (result.success) {
                        clearInterval(timerInterval);
                        // 紀錄完成時間
                        const now = new Date();
                        doneTime.innerText = now.toLocaleString();
                        
                        finalUrlInput.value = result.url;
                        preview.src = result.url;
                        preview.style.display = 'block';
                        infoPanel.style.display = 'block'; // 顯示資訊面板
                        
                        fileLabel.innerHTML = '<i class="fas fa-check-circle"></i> 上傳成功！';
                        gasBtn.disabled = false;
                        statusInfo.innerText = "部署完成，可進行第二步";
                    } else {
                        throw new Error(result.error);
                    }
                } catch (err) {
                    clearInterval(timerInterval);
                    alert("錯誤：" + err.message);
                    fileLabel.innerHTML = '上傳失敗';
                }
            };
        });

        gasBtn.addEventListener('click', async function() {
            const url = finalUrlInput.value;
            this.disabled = true;
            this.innerText = "傳送中...";
            try {
                await fetch(`${_sysNode()}?imgUrl=${encodeURIComponent(url)}`, { mode: 'no-cors' });
                alert('已發送 LINE 通知！');
            } catch (e) {
                alert('發送失敗');
            } finally {
                this.disabled = false;
                this.innerText = "第二步：點擊傳送至 LINE";
            }
        });

        document.getElementById('copyBtn').addEventListener('click', () => {
            finalUrlInput.select();
            document.execCommand('copy');
            alert('網址已複製');
        });
    </script>
</body>
</html>
