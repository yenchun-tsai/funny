<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歡迎光臨 - 蔡彥君</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; text-align: center; }
        .container { background: rgba(255, 255, 255, 0.15); padding: 2.5rem; border-radius: 20px; backdrop-filter: blur(15px); box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.2); max-width: 450px; width: 90%; }
        .input-group { margin: 20px 0; text-align: left; }
        .url-input { width: 100%; padding: 12px; border-radius: 8px; border: none; outline: none; box-sizing: border-box; font-size: 13px; margin-top: 8px; margin-bottom: 10px; background: rgba(255,255,255,0.9); color: #333; }
        .result-group { margin-top: 15px; text-align: left; background: rgba(255, 255, 255, 0.1); padding: 12px; border-radius: 10px; }
        .result-url-wrapper { display: flex; gap: 5px; margin-top: 8px; }
        .result-url-wrapper input { flex-grow: 1; padding: 10px; border-radius: 5px; border: none; font-size: 11px; background: #f0f0f0; color: #333; outline: none; }
        .btn-copy { background: #555; color: white; border: none; padding: 0 15px; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .file-label { display: block; background: rgba(255,255,255,0.2); border: 2px dashed rgba(255,255,255,0.4); padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.3s; margin-bottom: 15px; text-align: center; font-size: 14px; }
        #preview { max-width: 100%; margin: 15px 0; border-radius: 10px; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .btn-gas { background: #00c300; border: none; color: white; padding: 12px 20px; border-radius: 50px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; margin-bottom: 10px; }
        .btn-gas:disabled { background: #666 !important; opacity: 0.7; cursor: not-allowed; }
        .btn-reset { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.3); color: white; padding: 8px 15px; border-radius: 50px; cursor: pointer; font-size: 12px; width: 100%; transition: 0.3s; }
        .info-panel { margin-top: 15px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 10px; font-size: 11px; text-align: left; display: none; line-height: 1.6; }
        #timerDisplay { font-size: 14px; margin-top: 10px; color: #ffeb3b; font-weight: bold; display: none; }
        .status-text { font-size: 12px; margin-top: 5px; opacity: 0.8; height: 1.2em; }
    </style>
</head>
<body>

    <div class="container">
        <h1>蔡彥君歡迎您</h1>
        
        <div class="input-group">
            <label><i class="fas fa-desktop"></i> 第一步：點擊上傳圖片</label>
            <label for="fileInput" class="file-label" id="fileLabel">
                <i class="fas fa-cloud-upload-alt"></i> 選擇檔案
            </label>
            <input type="file" id="fileInput" accept="image/*" style="display:none;">
            <input type="text" id="imgUrlInput" class="url-input" placeholder="產生的 URL 會顯示在這裡" readonly>
        </div>

        <img id="preview">

        <div id="resultGroup" class="result-group">
            <label style="font-size: 11px;"><i class="fas fa-share-alt"></i> GitHub 直接連結：</label>
            <div class="result-url-wrapper">
                <input type="text" id="finalUrl" placeholder="尚未產生..." readonly>
                <button class="btn-copy" id="copyBtn">複製</button>
            </div>
        </div>

        <div id="infoPanel" class="info-panel">
            <div><i class="fas fa-clock"></i> 完成時間：<span id="doneTime">-</span></div>
            <div><i class="fas fa-network-wired"></i> 您的 IP：<span id="userIp">偵測中...</span></div>
        </div>

        <div style="margin-top: 20px;">
            <button class="btn-gas" id="gasBtn" disabled>第二步：點擊傳送至 LINE</button>
            <button class="btn-reset" id="resetBtn"><i class="fas fa-redo"></i> 重新上傳</button>
            
            <div id="timerDisplay">處理時間：<span id="seconds">0</span> 秒</div>
            <div id="statusInfo" class="status-text"></div>
        </div>
    </div>

    <script>
        // === 核心網址配置 ===
        const _partA = 'https://script.google.com/macros/s/';
        const _partB = 'AKfycbyampgiJY_OOubMgm6dap4ryWV5A_UO8qaL2nCSdWzni1o12vnrFAaTvC1La5vxL8m8/exec';
        const _node = () => _partA + _partB;

        let timerInterval;

        // 初始化偵測 IP
        (async () => {
            try {
                const r = await fetch('https://api.ipify.org?format=json');
                const d = await r.json();
                document.getElementById('userIp').innerText = d.ip;
            } catch(e) { document.getElementById('userIp').innerText = "無法偵測"; }
        })();

        // 重新上傳按鈕邏輯
        document.getElementById('resetBtn').addEventListener('click', () => {
            location.reload(); // 最徹底的重置方法
        });

        // 檔案選擇監聽
        document.getElementById('fileInput').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const label = document.getElementById('fileLabel');
            const status = document.getElementById('statusInfo');
            const timer = document.getElementById('timerDisplay');
            const sec = document.getElementById('seconds');
            const gasBtn = document.getElementById('gasBtn');

            label.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 上傳中...';
            status.innerText = "正在等待 GitHub 部署 (約需 45 秒)...";
            gasBtn.disabled = true;

            // 計時器
            let start = Date.now();
            timer.style.display = "block";
            timerInterval = setInterval(() => {
                sec.innerText = Math.floor((Date.now() - start) / 1000);
            }, 1000);

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const base64 = reader.result.split(',')[1];
                
                try {
                    // 使用 POST 發送
                    const response = await fetch(_node(), {
                        method: 'POST',
                        body: JSON.stringify({
                            name: file.name,
                            content: base64
                        })
                    });
                    
                    const res = await response.json();
                    
                    if (res.success) {
                        clearInterval(timerInterval);
                        document.getElementById('doneTime').innerText = new Date().toLocaleString();
                        document.getElementById('finalUrl').value = res.url;
                        document.getElementById('imgUrlInput').value = res.url;
                        document.getElementById('preview').src = res.url;
                        document.getElementById('preview').style.display = 'block';
                        document.getElementById('infoPanel').style.display = 'block';
                        label.innerHTML = '<i class="fas fa-check-circle"></i> 上傳成功';
                        gasBtn.disabled = false;
                        status.innerText = "一切就緒！";
                    } else {
                        throw new Error(res.error || "未知錯誤");
                    }
                } catch (err) {
                    clearInterval(timerInterval);
                    alert("上傳失敗：" + err.message);
                    label.innerHTML = '點擊重試';
                    status.innerText = "";
                }
            };
        });

        // 傳送 LINE 按鈕
        document.getElementById('gasBtn').addEventListener('click', async function() {
            const url = document.getElementById('finalUrl').value;
            this.disabled = true;
            this.innerText = "傳送中...";
            try {
                // 直接使用 URL 參數
                await fetch(`${_node()}?imgUrl=${encodeURIComponent(url)}`, { mode: 'no-cors' });
                alert('已發送 LINE 通知！');
            } catch (e) {
                alert('傳送失敗');
            } finally {
                this.disabled = false;
                this.innerText = "第二步：點擊傳送至 LINE";
            }
        });

        // 複製
        document.getElementById('copyBtn').addEventListener('click', () => {
            const el = document.getElementById('finalUrl');
            el.select();
            document.execCommand('copy');
            alert('連結已複製');
        });
    </script>
</body>
</html>
