<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歡迎光臨 - 蔡彥君</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; text-align: center; }
        .container { background: rgba(255, 255, 255, 0.15); padding: 2.5rem; border-radius: 20px; backdrop-filter: blur(15px); box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.2); max-width: 450px; width: 90%; }
        .input-group { margin: 20px 0; text-align: left; }
        .url-input { width: 100%; padding: 12px; border-radius: 8px; border: none; outline: none; box-sizing: border-box; font-size: 13px; margin-top: 8px; margin-bottom: 10px; background: rgba(255,255,255,0.9); color: #333; }
        .result-group { margin-top: 15px; text-align: left; background: rgba(255, 255, 255, 0.1); padding: 12px; border-radius: 10px; }
        .result-url-wrapper { display: flex; gap: 5px; margin-top: 8px; }
        .result-url-wrapper input { flex-grow: 1; padding: 10px; border-radius: 5px; border: none; font-size: 12px; background: #f0f0f0; color: #333; outline: none; }
        .btn-copy { background: #555; color: white; border: none; padding: 0 15px; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .file-label { display: block; background: rgba(255,255,255,0.2); border: 2px dashed rgba(255,255,255,0.4); padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.3s; margin-bottom: 15px; text-align: center; font-size: 14px; }
        #preview { max-width: 100%; margin: 15px 0; border-radius: 10px; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .btn-gas { background: #00c300; border: none; color: white; padding: 12px 20px; border-radius: 50px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn-gas:disabled { background: #666 !important; opacity: 0.7; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="container">
        <h1>蔡彥君歡迎您</h1>
        <div class="input-group">
            <label><i class="fas fa-desktop"></i> 第一步：點擊上傳圖片並產生網址</label>
            <label for="fileInput" class="file-label" id="fileLabel">
                <i class="fas fa-cloud-upload-alt"></i> 點擊此處選擇圖片
            </label>
            <input type="file" id="fileInput" accept="image/*">
            
            <input type="text" id="imgUrlInput" class="url-input" placeholder="產生的 URL 會顯示在這裡" readonly>
        </div>

        <img id="preview">

        <div id="resultGroup" class="result-group">
            <label style="font-size: 12px;"><i class="fas fa-share-alt"></i> GitHub 直接連結：</label>
            <div class="result-url-wrapper">
                <input type="text" id="finalUrl" placeholder="等待上傳中..." readonly>
                <button class="btn-copy" id="copyBtn">複製</button>
            </div>
        </div>

        <div style="margin-top: 20px;">
            <button class="btn-gas" id="gasBtn" disabled>第二步：點擊傳送至 LINE</button>
        </div>
    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbyampgiJY_OOubMgm6dap4ryWV5A_UO8qaL2nCSdWzni1o12vnrFAaTvC1La5vxL8m8/exec'; 

        const imgUrlInput = document.getElementById('imgUrlInput');
        const fileInput = document.getElementById('fileInput');
        const fileLabel = document.getElementById('fileLabel');
        const preview = document.getElementById('preview');
        const gasBtn = document.getElementById('gasBtn');
        const finalUrlInput = document.getElementById('finalUrl');
        const copyBtn = document.getElementById('copyBtn');

        fileInput.addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // 1. 設定初始狀態
            fileLabel.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 正在處理 GitHub 上傳...';
            finalUrlInput.value = "正在產生網址，請稍後...";
            gasBtn.disabled = true;
            gasBtn.innerText = "正在產生網址...";

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const base64Content = reader.result.split(',')[1];
                const formData = new URLSearchParams();
                formData.append('name', file.name);
                formData.append('content', base64Content);

                try {
                    // 2. 真正發送請求並等待回應
                    const response = await fetch(GAS_URL, {
                        method: 'POST',
                        mode: 'cors',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: formData.toString()
                    });
                    
                    // 檢查回應是否正常
                    if (!response.ok) throw new Error("網路請求失敗");

                    const result = await response.json();
                    
                    if (result.success) {
                        // 3. 只有成功拿到網址後，才更新介面與按鈕
                        finalUrlInput.value = result.url;
                        imgUrlInput.value = result.url;
                        preview.src = result.url;
                        preview.style.display = 'block';
                        
                        fileLabel.innerHTML = '<i class="fas fa-check-circle"></i> 網址產生成功！';
                        gasBtn.disabled = false;
                        gasBtn.innerText = "第二步：點擊傳送至 LINE";
                    } else {
                        // 如果 GAS 回報錯誤（例如 Token 失效）
                        finalUrlInput.value = "錯誤：" + result.error;
                        fileLabel.innerHTML = '<i class="fas fa-times-circle"></i> 上傳失敗';
                    }
                } catch (err) {
                    // 4. 只有在真正的「連線中斷」或「語法錯誤」時才彈窗
                    console.error('Fetch Error:', err);
                    finalUrlInput.value = "連線失敗，請檢查 GAS 設定";
                    alert("連線 GAS 發生異常！\n請確認您的 GAS 是否已部署為「所有人」。");
                }
            };
        });

        // 點擊按鈕才傳送
        gasBtn.addEventListener('click', async function() {
            const url = finalUrlInput.value;
            if(!url || url.includes("正在")) return;

            this.disabled = true;
            this.innerText = "正在通知機器人...";
            
            try {
                await fetch(`${GAS_URL}?imgUrl=${encodeURIComponent(url)}`, { mode: 'no-cors' });
                alert('已發送指令！請去 LINE 查看圖片。');
            } catch (e) {
                alert('傳送失敗');
            } finally {
                this.disabled = false;
                this.innerText = "第二步：點擊傳送至 LINE";
            }
        });

        copyBtn.addEventListener('click', () => {
            finalUrlInput.select();
            document.execCommand('copy');
            alert('已複製網址！');
        });
    </script>
</body>
</html>
