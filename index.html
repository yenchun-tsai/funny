<div class="passcode-box">
    <i class="fas fa-key"></i> 
    <input type="password" id="passcodeInput" placeholder="通行碼">
    <button id="verifyBtn" style="background: rgba(255,255,255,0.2); border: 1px solid white; color: white; border-radius: 4px; cursor: pointer; font-size: 10px; padding: 2px 8px;">確認</button>
</div>

<script>
    // ... 之前的變數定義 ...

    // 新增：驗證按鈕邏輯
    document.getElementById('verifyBtn').onclick = async function() {
        const pass = document.getElementById('passcodeInput').value;
        const btn = this;
        if (!pass) return alert("請輸入通行碼");

        btn.innerText = "驗證中...";
        try {
            const res = await fetch(_u(), {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: "check_passcode", passcode: pass })
            });
            const result = await res.json();
            if (result.success) {
                alert("✅ 通行碼正確，Debug 模式已啟動");
                btn.style.background = "#00c300";
                btn.innerText = "已驗證";
            } else {
                alert("❌ 通行碼錯誤");
                btn.innerText = "確認";
            }
        } catch (e) {
            alert("連線失敗");
            btn.innerText = "確認";
        }
    };

    // 修改 sendToProxy 內部的 debug 顯示判斷
    async function sendToProxy(fileName, base64Data, pass) {
        try {
            const res = await fetch(_u(), {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: fileName, content: base64Data, passcode: pass })
            });
            
            const result = await res.json();
            
            // 根據 Worker 回傳的 showDebug 旗標來決定是否顯示
            if (result.showDebug && result.debug) {
                document.getElementById('debugPanel').style.display = 'block';
                document.getElementById('debugContent').innerHTML = `
GAS 執行: ${result.success ? "✅ 成功" : "❌ 失敗"}
---------------------------
GitHub: ${result.debug.HAS_GITHUB_TOKEN ? "✅ 已載入" : "⚠️ 未偵測"}
LINE: ${result.debug.HAS_LINE_TOKEN ? "✅ 已載入" : "⚠️ 未偵測"}
金鑰: ${result.debug.WEB_SECRET_MATCH ? "✅ 匹配" : "❌ 錯誤"}
---------------------------
訊息: ${result.message || "無"}
                `;
            } else {
                document.getElementById('debugPanel').style.display = 'none';
            }

            // ... 後續處理成功/失敗的邏輯 ...
            if (result.success) {
                // 原有的成功邏輯...
                clearInterval(timerInterval);
                document.getElementById('doneTime').innerText = new Date().toLocaleString();
                document.getElementById('finalUrl').value = result.url || "";
                document.getElementById('imgUrlInput').value = result.url || "";
                document.getElementById('infoPanel').style.display = 'block';
                label.innerHTML = '<i class="fas fa-check-circle"></i> 成功';
                document.getElementById('gasBtn').disabled = false;
            } else { throw new Error(result.error); }
        } catch (err) {
            clearInterval(timerInterval);
            alert("失敗: " + err.message);
        }
    }
</script>
