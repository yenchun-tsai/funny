<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歡迎光臨 - 蔡彥君</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; text-align: center; }
        .container { background: rgba(255, 255, 255, 0.15); padding: 2.5rem; border-radius: 20px; backdrop-filter: blur(15px); box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.2); max-width: 450px; width: 90%; }
        .input-group { margin: 20px 0; text-align: left; }
        .url-input { width: 100%; padding: 12px; border-radius: 8px; border: none; outline: none; box-sizing: border-box; font-size: 13px; margin-top: 8px; margin-bottom: 10px; background: rgba(255,255,255,0.9); color: #333; }
        .file-label { display: block; background: rgba(255,255,255,0.2); border: 2px dashed rgba(255,255,255,0.4); padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.3s; margin-bottom: 15px; text-align: center; font-size: 14px; }
        #preview { max-width: 100%; margin: 15px 0; border-radius: 10px; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .btn-gas { background: #00c300; border: none; color: white; padding: 12px 20px; border-radius: 50px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; margin-bottom: 10px; }
        .btn-gas:disabled { background: #666 !important; opacity: 0.7; cursor: not-allowed; }
        .btn-reset { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.3); color: white; padding: 8px 15px; border-radius: 50px; cursor: pointer; font-size: 12px; width: 100%; transition: 0.3s; }
        .status-text { font-size: 12px; margin-top: 5px; opacity: 0.8; min-height: 1.2em; }
        .delete-option { margin-top: 10px; text-align: right; font-size: 12px; display: flex; align-items: center; justify-content: flex-end; gap: 5px; }
        #debugPanel { margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.85); border-radius: 10px; font-size: 11px; text-align: left; display: none; color: #00ff00; font-family: 'Consolas', monospace; border: 1px solid #555; }
        .auth-section { margin-top: 20px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); display: flex; gap: 8px; justify-content: flex-end; }
        .auth-input { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 6px; border-radius: 5px; width: 100px; font-size: 11px; }
        .btn-verify { background: #f39c12; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 11px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>蔡彥君歡迎您</h1>
        
        <div class="input-group">
            <label><i class="fas fa-desktop"></i> 第一步：上傳圖片</label>
            <label for="fileInput" class="file-label" id="fileLabel">
                <i class="fas fa-cloud-upload-alt"></i> 選擇檔案 (限圖片)
            </label>
            <input type="file" id="fileInput" accept="image/*" style="display:none;">
            
            <div class="delete-option">
                <input type="checkbox" id="autoDelete" checked> 
                <label for="autoDelete" style="cursor:pointer;">傳送後自動刪除 GitHub 備份</label>
            </div>

            <input type="text" id="imgUrlInput" class="url-input" placeholder="URL 會顯示在這裡" readonly>
        </div>

        <img id="preview">

        <div style="margin-top: 20px;">
            <button class="btn-gas" id="gasBtn" disabled>第二步：點擊傳送至 LINE</button>
            <button class="btn-reset" id="resetBtn">重新上傳 / 清空</button>
            <div id="statusInfo" class="status-text"></div>
        </div>

        <div class="auth-section">
            <input type="password" id="debugPass" class="auth-input" placeholder="金鑰">
            <button class="btn-verify" id="verifyBtn">驗證監測</button>
        </div>

        <div id="debugPanel">
            <div id="debugContent"></div>
        </div>
    </div>

    <script>
        const API_URL = "https://gas-proxy.amison.workers.dev";
        let timerInterval;

        // 重設按鈕
        document.getElementById('resetBtn').onclick = () => location.reload();

        // 檔案選取監聽
        document.getElementById('fileInput').onchange = function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // 格式檢查
            if (!file.type.startsWith('image/')) {
                alert("請選擇圖片檔案！");
                return;
            }

            const preview = document.getElementById('preview');
            const label = document.getElementById('fileLabel');
            const status = document.getElementById('statusInfo');
            const autoDelete = document.getElementById('autoDelete').checked;

            const reader = new FileReader();
            reader.onload = (event) => {
                preview.src = event.target.result;
                preview.style.display = 'block';
                label.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 上傳中...';
                status.innerText = "正在處理並上傳...";
                
                const base64 = event.target.result.split(',')[1];
                uploadFile(file.name, base64, autoDelete);
            };
            reader.readAsDataURL(file);
        };

        // 上傳函數
        async function uploadFile(name, content, shouldDelete) {
            const status = document.getElementById('statusInfo');
            const gasBtn = document.getElementById('gasBtn');
            const label = document.getElementById('fileLabel');

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'upload',
                        name: name,
                        content: content,
                        autoDelete: shouldDelete
                    })
                });

                const result = await response.json();
                console.log("Upload Result:", result);

                if (result.success) {
                    document.getElementById('imgUrlInput').value = result.url;
                    label.innerHTML = '<i class="fas fa-check-circle"></i> 上傳成功';
                    gasBtn.disabled = false;
                    status.innerText = result.message || "上傳完成，可傳送至 LINE。";
                } else {
                    throw new Error(result.error || "後端回傳錯誤");
                }
            } catch (err) {
                console.error(err);
                alert("上傳失敗: " + err.message);
                label.innerHTML = '重試上傳';
                status.innerText = "錯誤: " + err.message;
            }
        }

        // 傳送 LINE
        document.getElementById('gasBtn').onclick = async function() {
            const url = document.getElementById('imgUrlInput').value;
            this.disabled = true;
            this.innerText = "傳送中...";
            try {
                const res = await fetch(`${API_URL}?imgUrl=${encodeURIComponent(url)}`);
                alert('已發送至 LINE！');
            } catch (e) { alert('傳送失敗'); }
            this.innerText = "第二步：點擊傳送至 LINE";
            this.disabled = false;
        };

        // 驗證監測
        document.getElementById('verifyBtn').onclick = async function() {
            const pass = document.getElementById('debugPass').value;
            if (!pass) return alert("請輸入金鑰");

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'verify', passcode: pass })
                });
                const result = await res.json();
                if (result.auth) {
                    document.getElementById('debugPanel').style.display = 'block';
                    document.getElementById('debugContent').innerText = "驗證成功，系統監控已解鎖。";
                } else {
                    alert("金鑰錯誤");
                }
            } catch (e) { alert("連線失敗"); }
        };
    </script>
</body>
</html>
