<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歡迎光臨 - 蔡彥君</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; text-align: center; }
        .container { background: rgba(255, 255, 255, 0.15); padding: 2.5rem; border-radius: 20px; backdrop-filter: blur(15px); box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.2); max-width: 450px; width: 90%; }
        .counter-box { margin: 15px 0; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-reset { background: none; border: none; color: rgba(255,255,255,0.6); cursor: pointer; font-size: 14px; transition: 0.3s; }
        .btn-reset:hover { color: #ff4d4d; transform: rotate(90deg); }
        .input-group { margin: 20px 0; text-align: left; }
        .url-input { width: 100%; padding: 12px; border-radius: 8px; border: none; outline: none; box-sizing: border-box; font-size: 13px; margin-top: 8px; margin-bottom: 10px; background: rgba(255,255,255,0.9); color: #333; }
        
        /* 轉換後 URL 顯示區塊 */
        .result-group { margin-top: 15px; text-align: left; display: none; }
        .result-url-wrapper { display: flex; gap: 5px; margin-top: 5px; }
        .result-url-wrapper input { flex-grow: 1; padding: 8px; border-radius: 5px; border: none; font-size: 12px; background: #f0f0f0; color: #333; }
        .btn-copy { background: #555; color: white; border: none; padding: 0 12px; border-radius: 5px; cursor: pointer; font-size: 12px; transition: 0.3s; }
        .btn-copy:hover { background: #333; }

        .file-label { display: block; background: rgba(255,255,255,0.2); border: 2px dashed rgba(255,255,255,0.4); padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.3s; margin-bottom: 15px; text-align: center; font-size: 14px; }
        .file-label:hover { background: rgba(255,255,255,0.3); }
        #fileInput { display: none; }
        #preview { max-width: 100%; margin: 15px 0; border-radius: 10px; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .action-row { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .btn-group { display: flex; gap: 10px; width: 100%; }
        .btn-gas, .btn-personal { border: none; color: white; padding: 12px 20px; border-radius: 50px; cursor: pointer; font-weight: bold; flex-grow: 1; transition: 0.3s; font-size: 14px; }
        .btn-gas { background: #00c300; }
        .btn-personal { background: #007bff; }
        .btn-gas:disabled, .btn-personal:disabled { background: #666 !important; cursor: wait; }
    </style>
</head>
<body>

    <div class="container">
        <h1>蔡彥君歡迎您</h1>
        <div class="counter-box">
            <span>您是第 <span id="count">0</span> 位訪客</span>
            <button class="btn-reset" id="resetBtn"><i class="fas fa-undo-alt"></i></button>
        </div>

        <div class="input-group">
            <label><i class="fas fa-desktop"></i> 從電腦上傳圖片：</label>
            <label for="fileInput" class="file-label" id="fileLabel">
                <i class="fas fa-cloud-upload-alt"></i> 點擊選擇電腦中的圖片
            </label>
            <input type="file" id="fileInput" accept="image/*">

            <label><i class="fas fa-link"></i> 或直接輸入網址：</label>
            <input type="text" id="imgUrlInput" class="url-input" placeholder="https://example.com/image.jpg">
        </div>

        <img id="preview">

        <div id="resultGroup" class="result-group">
            <label style="font-size: 12px;"><i class="fas fa-share-alt"></i> GitHub 圖片直接連結：</label>
            <div class="result-url-wrapper">
                <input type="text" id="finalUrl" readonly>
                <button class="btn-copy" id="copyBtn">複製</button>
            </div>
        </div>

        <div class="action-row">
            <div class="btn-group">
                <button class="btn-gas" id="gasBtn">機器人傳送</button>
                <button class="btn-personal" id="personalBtn">傳送到個人視窗</button>
            </div>
        </div>
    </div>

    <script>
        // 請務必更新為你最新部署的 GAS 網址
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbyampgiJY_OOubMgm6dap4ryWV5A_UO8qaL2nCSdWzni1o12vnrFAaTvC1La5vxL8m8/exec'; 

        const imgUrlInput = document.getElementById('imgUrlInput');
        const fileInput = document.getElementById('fileInput');
        const fileLabel = document.getElementById('fileLabel');
        const preview = document.getElementById('preview');
        const gasBtn = document.getElementById('gasBtn');
        const personalBtn = document.getElementById('personalBtn');
        const resultGroup = document.getElementById('resultGroup');
        const finalUrlInput = document.getElementById('finalUrl');
        const copyBtn = document.getElementById('copyBtn');

        function updatePreview(url) {
            if (url) {
                preview.src = url;
                preview.style.display = 'block';
                finalUrlInput.value = url;
                resultGroup.style.display = 'block';
            } else {
                preview.style.display = 'none';
                resultGroup.style.display = 'none';
            }
        }

        fileInput.addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            gasBtn.disabled = true;
            fileLabel.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 上傳中...';

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const base64Content = reader.result.split(',')[1];
                try {
                    // 使用 POST 請求，並顯式宣告 mode: 'cors'
                    const response = await fetch(GAS_URL, {
                        method: 'POST',
                        mode: 'cors', 
                        body: JSON.stringify({
                            name: file.name,
                            content: base64Content
                        })
                    });
                    
                    const result = await response.json();
                    
                    if (result.success) {
                        imgUrlInput.value = result.url;
                        updatePreview(result.url);
                        fileLabel.innerHTML = '<i class="fas fa-check-circle"></i> 成功存至 GitHub！';
                    } else {
                        throw new Error(result.error || '未知錯誤');
                    }
                } catch (err) {
                    console.error('Error:', err);
                    alert("連線失敗！請檢查：\n1. GAS 部署是否設為「所有人」\n2. 是否更換了最新部署網址\n3. 網路是否正常");
                    fileLabel.innerHTML = '<i class="fas fa-exclamation-triangle"></i> 上傳失敗';
                } finally {
                    gasBtn.disabled = false;
                    setTimeout(() => { fileLabel.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> 點擊選擇電腦中的圖片'; }, 3000);
                }
            };
        });

        copyBtn.addEventListener('click', function() {
            finalUrlInput.select();
            finalUrlInput.setSelectionRange(0, 99999); 
            navigator.clipboard.writeText(finalUrlInput.value).then(() => {
                const originalText = copyBtn.innerText;
                copyBtn.innerText = '已複製';
                setTimeout(() => { copyBtn.innerText = originalText; }, 2000);
            });
        });

        gasBtn.addEventListener('click', async function() {
            const urlToSend = imgUrlInput.value.trim();
            if (!urlToSend) { alert("請先上傳圖片或輸入網址！"); return; }
            this.disabled = true;
            try {
                // 機器人傳送通常使用 GET 觸發
                await fetch(`${GAS_URL}?imgUrl=${encodeURIComponent(urlToSend)}`, { mode: 'no-cors' });
                alert('發送指令成功！');
            } catch (e) { 
                alert('傳送失敗'); 
            } finally { 
                this.disabled = false; 
            }
        });

        personalBtn.addEventListener('click', function() {
            const urlToSend = imgUrlInput.value.trim();
            if (!urlToSend) { alert("請先上傳圖片！"); return; }
            const lineUrl = `https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(urlToSend)}`;
            window.open(lineUrl, '_blank', 'width=500,height=500');
        });
    </script>
</body>
</html>
