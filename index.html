<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歡迎光臨 - 蔡彥君</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: linear-gradient(135deg, #f5f7fa, #c3cfe2); color: #333; text-align: center; }
        .container { background: white; padding: 2.5rem; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 400px; width: 90%; }
        h1 { color: #1e3c72; margin-bottom: 5px; }
        .counter-box { margin: 20px 0; font-size: 1.1rem; color: #666; }
        
        /* 分享按鈕區域樣式 (模仿你截圖的風格) */
        .share-section {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 30px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
        .share-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 1px solid #ddd;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            text-decoration: none;
            transition: 0.2s;
            color: #333;
            font-size: 20px;
        }
        .share-btn:hover { background-color: #f8f9fa; border-color: #bbb; }
        .line-color { color: #00c300; font-size: 24px; } /* LINE 綠色 */
    </style>
</head>
<body>

    <div class="container">
        <h1>蔡彥君歡迎您</h1>
        <div class="counter-box">造訪次數：<span id="count">0</span></div>

        <p>點擊下方圖示分享本站給好友：</p>

        <div class="share-section">
            <a class="share-btn" href="javascript:void(0);"><i class="fab fa-facebook-f"></i></a>
            
            <a class="share-btn" id="lineShare" target="_blank">
                <i class="fab fa-line line-color"></i>
            </a>

            <a class="share-btn" href="javascript:void(0);"><i class="fas fa-link"></i></a>
        </div>
    </div>

    <script>
        // 計數器
        let visits = localStorage.getItem('v_count') || 0;
        visits++;
        localStorage.setItem('v_count', visits);
        document.getElementById('count').innerText = visits;

        // 設定 LINE 分享連結
        // 格式：https://social-plugins.line.me/lineit/share?url=網址&text=文字
        const shareUrl = window.location.href; // 自動取得你目前的網頁網址
        const shareText = encodeURIComponent("嘿！快來看看蔡彥君的網頁，我是第 " + visits + " 位訪客！");
        
        const lineBtn = document.getElementById('lineShare');
        lineBtn.href = `https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(shareUrl)}&text=${shareText}`;
    </script>
</body>
</html>
