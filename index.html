<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歡迎光臨 - 蔡彥君</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; text-align: center; }
        .container { background: rgba(255, 255, 255, 0.15); padding: 2.5rem; border-radius: 20px; backdrop-filter: blur(15px); box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.2); max-width: 450px; width: 90%; }
        .counter-box { margin: 15px 0; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-reset { background: none; border: none; color: rgba(255,255,255,0.6); cursor: pointer; font-size: 14px; transition: 0.3s; }
        .btn-reset:hover { color: #ff4d4d; transform: rotate(90deg); }
        .input-group { margin: 20px 0; text-align: left; }
        .url-input { width: 100%; padding: 12px; border-radius: 8px; border: none; outline: none; box-sizing: border-box; font-size: 13px; margin-top: 8px; margin-bottom: 10px; background: rgba(255,255,255,0.9); color: #333; }
        
        .result-group { margin-top: 15px; text-align: left; display: block; background: rgba(255, 255, 255, 0.1); padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .result-url-wrapper { display: flex; gap: 5px; margin-top: 8px; }
        .result-url-wrapper input { flex-grow: 1; padding: 10px; border-radius: 5px; border: none; font-size: 12px; background: #f0f0f0; color: #333; outline: none; font-weight: bold; }
        .btn-copy { background: #555; color: white; border: none; padding: 0 15px; border-radius: 5px; cursor: pointer; font-size: 12px; transition: 0.3s; white-space: nowrap; }

        .file-label { display: block; background: rgba(255,255,255,0.2); border: 2px dashed rgba(255,255,255,0.4); padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.3s; margin-bottom: 15px; text-align: center; font-size: 14px; }
        #fileInput { display: none; }
        #preview { max-width: 100%; margin: 15px 0; border-radius: 10px; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .action-row { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .btn-group { display: flex; gap: 10px; width: 100%; }
        .btn-gas, .btn-personal { border: none; color: white; padding: 12px 20px; border-radius: 50px; cursor: pointer; font-weight: bold; flex-grow: 1; transition: 0.3s; font-size: 14px; }
        .btn-gas { background: #00c300; }
        .btn-personal { background: #007bff; }
        .btn-gas:disabled { background: #666 !important; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="container">
        <h1>蔡彥君歡迎您</h1>
        <div class="counter-box">
            <span>您是第 <span id="count">0</span> 位訪客</span>
            <button class="btn-reset" id="resetBtn"><i class="fas fa-undo-alt"></i></button>
        </div>

        <div class="input-group">
            <label><i class="fas fa-desktop"></i> 第一步：從電腦上傳圖片</label>
            <label for="fileInput" class="file-label" id="fileLabel">
                <i class="fas fa-cloud-upload-alt"></i> 點擊上傳並產生 URL
            </label>
            <input type="file" id="fileInput" accept="image/*">

            <label><i class="fas fa-link"></i> 或直接輸入網址：</label>
            <input type="text" id="imgUrlInput" class="url-input" placeholder="https://example.com/image.jpg">
        </div>

        <img id="preview">

        <div id="resultGroup" class="result-group">
            <label style="font-size: 12px; color: #fff; font-weight: bold;"><i class="fas fa-share-alt"></i> GitHub 圖片直接連結：</label>
            <div class="result-url-wrapper">
                <input type="text" id="finalUrl" placeholder="等待上傳中..." readonly>
                <button class="btn-copy" id="copyBtn">複製</button>
            </div>
        </div>

        <div class="action-row">
            <label style="text-align: left; font-size: 12px; margin-bottom: 5px;"><i class="fas fa-paper-plane"></i> 第二步：傳送至 LINE</label>
            <div class="btn-group">
                <button class="btn-gas" id="gasBtn" disabled>機器人傳送 (請先完成上傳)</button>
                <button class="btn-personal" id="personalBtn">傳送到個人視窗</button>
            </div>
        </div>
    </div>

    <script>
        // 更新為你最新的 GAS 網址
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbyampgiJY_OOubMgm6dap4ryWV5A_UO8qaL2nCSdWzni1o12vnrFAaTvC1La5vxL8m8/exec'; 

        const imgUrlInput = document.getElementById('imgUrlInput');
        const fileInput = document.getElementById('fileInput');
        const fileLabel = document.getElementById('fileLabel');
        const preview = document.getElementById('preview');
        const gasBtn = document.getElementById('gasBtn');
        const personalBtn = document.getElementById('personalBtn');
        const finalUrlInput = document.getElementById('finalUrl');
        const copyBtn = document.getElementById('copyBtn');

        // 上傳圖片並產生 URL 的邏輯
        fileInput.addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // 初始化狀態
            fileLabel.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 正在上傳至 GitHub...';
            finalUrlInput.value = "正在產生 URL...";
            gasBtn.disabled = true;
            gasBtn.innerText = "機器人傳送 (處理中...)";

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const base64Content = reader.result.split(',')[1];
                const formData = new URLSearchParams();
                formData.append('name', file.name);
                formData.append('content', base64Content);

                try {
                    const response = await fetch(GAS_URL, {
                        method: 'POST',
                        mode: 'cors',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: formData.toString()
                    });
                    
                    const result = await response.json();
                    
                    if (result.success) {
                        // 1. 填入 URL
                        imgUrlInput.value = result.url;
                        finalUrlInput.value = result.url;
                        
                        // 2. 顯示預覽
                        preview.src = result.url;
                        preview.style.display = 'block';
                        
                        // 3. 成功後才啟用傳送按鈕
                        fileLabel.innerHTML = '<i class="fas fa-check-circle"></i> URL 產生成功！';
                        gasBtn.disabled = false;
                        gasBtn.innerText = "機器人傳送";
                    } else {
                        throw new Error(result.error);
                    }
                } catch (err) {
                    fileLabel.innerHTML = '<i class="fas fa-exclamation-triangle"></i> 產生失敗';
                    finalUrlInput.value = "失敗，請確認 GAS 權限或 Token";
                    alert("產生 URL 失敗，請確認 GAS 部署是否為「所有人」。");
                }
            };
        });

        // 機器人傳送 (純粹執行傳送，不負責上傳)
        gasBtn.addEventListener('click', async function() {
            const urlToSend = finalUrlInput.value.trim();
            if (!urlToSend || urlToSend.includes("等待")) { alert("請先上傳圖片！"); return; }
            
            this.disabled = true;
            this.innerText = "傳送中...";
            
            try {
                // 使用 GET 觸發 GAS 的傳送邏輯
                await fetch(`${GAS_URL}?imgUrl=${encodeURIComponent(urlToSend)}`, { mode: 'no-cors' });
                alert('已成功通知機器人傳送圖片！');
            } catch (e) {
                alert('傳送至 LINE 失敗');
            } finally {
                this.disabled = false;
                this.innerText = "機器人傳送";
            }
        });

        // 其他功能維持不變
        copyBtn.addEventListener('click', function() {
            if (!finalUrlInput.value || finalUrlInput.value.includes("等待")) return;
            finalUrlInput.select();
            navigator.clipboard.writeText(finalUrlInput.value).then(() => {
                const originalText = copyBtn.innerText;
                copyBtn.innerText = '已複製';
                setTimeout(() => { copyBtn.innerText = originalText; }, 2000);
            });
        });

        personalBtn.addEventListener('click', function() {
            const urlToSend = imgUrlInput.value.trim() || finalUrlInput.value.trim();
            if (!urlToSend || urlToSend.includes("等待")) { alert("請先提供網址！"); return; }
            window.open(`https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(urlToSend)}`, '_blank', 'width=500,height=500');
        });
    </script>
</body>
</html>
